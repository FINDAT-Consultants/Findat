html,body{margin:0;min-height:100%;background:#fbfaf6}
#启动7{min-height:100vh;display:grid;place-items:center;padding:24px;box-sizing:border-box;font-family:Arial,sans-serif;color:#354155;background:radial-gradient(circle at 50% 45%,#fff8df 0,#fbfaf6 42%,#f3f0e7 100%);overflow:hidden}
.findat-loader{display:grid;justify-items:center;gap:24px;text-align:center}
.findat-sun{position:relative;width:144px;height:144px;display:grid;place-items:center;filter:drop-shadow(0 14px 26px rgba(231,143,24,.16))}
.findat-rays{position:absolute;inset:0;animation:findat-spin 5s linear infinite}
.findat-ray{--angle:calc(var(--i)*30deg);position:absolute;left:50%;top:50%;width:5px;height:22px;margin:-11px 0 0 -2.5px;border-radius:999px;background:linear-gradient(180deg,#ffba45,#e87912);transform:rotate(var(--angle)) translateY(-58px);animation:findat-ray-glow 1.2s ease-in-out infinite;animation-delay:calc(var(--i)*-.1s);box-shadow:0 0 10px rgba(255,166,34,.38)}
.findat-sun-core{position:relative;width:82px;height:82px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(145deg,#fffdf7,#ffe8a8);box-shadow:0 0 0 7px rgba(255,255,255,.85),0 0 0 10px rgba(246,166,42,.18),0 12px 28px rgba(221,128,14,.22);animation:findat-core-pulse 1.8s ease-in-out infinite}
.findat-sun-core::after{content:"";position:absolute;inset:-15px;border:2px solid rgba(241,147,24,.18);border-radius:50%;animation:findat-orbit-pulse 1.8s ease-out infinite}
.findat-sun-core img{width:58px;height:58px;object-fit:contain;display:block;filter:drop-shadow(0 4px 7px rgba(196,91,0,.18))}
.findat-loader-copy{display:grid;gap:7px}
.findat-loader-title{margin:0;font-size:16px;line-height:1.2;letter-spacing:.19em;font-weight:800;color:#27364c}
.findat-loader-status{margin:0;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#7c8797}
.findat-loader-dots::after{content:"";display:inline-block;width:1.35em;text-align:left;animation:findat-dots 1.4s steps(4,end) infinite}
@keyframes findat-spin{to{transform:rotate(360deg)}}
@keyframes findat-ray-glow{0%,100%{opacity:.3;height:17px}50%{opacity:1;height:25px}}
@keyframes findat-core-pulse{0%,100%{transform:scale(.96)}50%{transform:scale(1.04)}}
@keyframes findat-orbit-pulse{0%{opacity:.7;transform:scale(.78)}75%,100%{opacity:0;transform:scale(1.28)}}
@keyframes findat-dots{0%{content:""}25%{content:"."}50%{content:".."}75%,100%{content:"..."}}
@media (prefers-reduced-motion:reduce){.findat-rays,.findat-ray,.findat-sun-core,.findat-sun-core::after,.findat-loader-dots::after{animation:none}.findat-loader-dots::after{content:"..."}}
